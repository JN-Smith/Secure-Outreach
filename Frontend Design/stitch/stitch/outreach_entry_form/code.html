<div class="h-1 w-12 bg-secondary-fixed-dim rounded-full"></div>
</header>
<form class="space-y-10">
<!-- Personal Details Section -->
<section class="space-y-6">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary" data-icon="person_add">person_add</span>
<h3 class="font-headline text-sm font-bold uppercase tracking-widest text-on-surface-variant">Identity</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-1">Full Name</label>
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container font-body transition-all" placeholder="Enter contact's name" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-1">Contact Number</label>
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container font-body transition-all" placeholder="+254..." type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-1">Location / Neighborhood</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl" data-icon="location_on">location_on</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container font-body transition-all" placeholder="e.g. Kibera Sector 3" type="text"/>
</div>
</div>
</section>
<!-- Spiritual Status Section -->
<section class="p-6 rounded-2xl bg-surface-container-low space-y-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="auto_awesome">auto_awesome</span>
<h3 class="font-headline text-sm font-bold uppercase tracking-widest text-on-surface-variant">Spiritual Journey</h3>
</div>
<div class="space-y-4">
<label class="font-label text-sm font-semibold text-on-surface-variant">Salvation Status</label>
<div class="grid grid-cols-3 gap-2">
<button class="h-16 flex flex-col items-center justify-center gap-1 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-secondary-fixed-dim transition-all group" type="button">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary" data-icon="favorite">favorite</span>
<span class="text-[10px] font-bold uppercase">Saved</span>
</button>
<button class="h-16 flex flex-col items-center justify-center gap-1 rounded-xl bg-primary-container text-white shadow-lg shadow-primary-container/20" type="button">
<span class="material-symbols-outlined" data-icon="heart_broken">heart_broken</span>
<span class="text-[10px] font-bold uppercase">Not Saved</span>
</button>
<button class="h-16 flex flex-col items-center justify-center gap-1 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-secondary-fixed-dim transition-all group" type="button">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary" data-icon="help_center">help_center</span>
<span class="text-[10px] font-bold uppercase">Unsure</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-4 border-t border-surface-container-highest">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="school">school</span>
<span class="font-label text-sm font-medium">Student Status</span>
</div>
<div class="flex bg-surface-container-highest p-1 rounded-full">
<button class="px-6 py-1.5 rounded-full text-xs font-bold uppercase bg-white text-primary shadow-sm" type="button">Yes</button>
<button class="px-6 py-1.5 rounded-full text-xs font-bold uppercase text-on-surface-variant" type="button">No</button>
</div>
</div>
</section>
<!-- Follow-up Section -->
<section class="space-y-6">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary" data-icon="event_repeat">event_repeat</span>
<h3 class="font-headline text-sm font-bold uppercase tracking-widest text-on-surface-variant">Discipleship Plan</h3>
</div>
<div class="space-y-4">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-1">Follow-up Priority</label>
<select class="w-full h-14 px-4 rounded-xl bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container font-body appearance-none">
<option>Immediate (Within 24hrs)</option>
<option>Routine (Weekly)</option>
<option>Long-term</option>
<option>No Follow-up required</option>
</select>
</div>
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-1">Personal Notes &amp; Prayer Requests</label>
<textarea class="w-full p-4 rounded-xl bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container font-body transition-all resize-none" placeholder="Brief details about the conversation..." rows="4"></textarea>
</div>
<!-- Consent -->
<label class="flex items-start gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer group transition-colors hover:bg-surface-container-high">
<div class="relative flex items-center mt-1">
<input class="w-6 h-6 rounded border-none bg-surface-container-highest text-primary-container focus:ring-offset-0 focus:ring-primary-container" type="checkbox"/>
</div>
<span class="font-label text-sm text-on-surface-variant leading-relaxed">
                        I have received formal consent to record these personal details for the purposes of spiritual follow-up and ministry outreach.
                    </span>
</label>
</section>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full h-16 bg-[#001f3f] text-white rounded-xl font-headline font-bold text-lg tracking-wide shadow-xl shadow-primary-container/20 flex items-center justify-center gap-3 active:scale-[0.98] transition-all" type="submit">
<span>Submit Entry</span>
<span class="material-symbols-outlined text-secondary-fixed-dim" data-icon="send">send</span>
</button>
<p class="text-center mt-6 text-[11px] font-label font-medium text-outline-variant uppercase tracking-[0.2em]">
                    End of Ledger Entry MK-2024-A

</div>
